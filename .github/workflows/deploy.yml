name: Deploy to RunPod

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          # Yahan direct apna username likh dein (e.g., shehzarubaid)
          # Taake agar secret fail ho to bhi tag sahi rahay
          username: ${{ secrets.DOCKER_USERNAME || 'APNA_DOCKER_USERNAME_YAHAN_LIKHEIN' }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Is line ko dhayan se dekhein: Yahan main ne 'OR' logic lagayi hai
          tags: ${{ secrets.DOCKER_USERNAME || 'APNA_DOCKER_USERNAME_YAHAN_LIKHEIN' }}/avafinite-ltx:latest