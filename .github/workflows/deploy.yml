- name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          # Yahan wo names likhein jo aapne GitHub Secrets mein save kiye hain
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Username dynamic rakhein taake error na aaye
          tags: ${{ secrets.DOCKER_USERNAME }}/avafinite-ltx:latest