name: Deploy to RunPod

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # v3 se v4 better hai

      - name: Login to Docker Hub
        uses: docker/login-action@v3   # v2 se v3 recommended
        with:
          username: shehzarubaid
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5   # v4 se v5/v6 better (latest v7 bhi chalega)
        with:
          context: .
          push: true
          tags: |
            shehzarubaid/avafinite-ltx:latest
            shehzarubaid/avafinite-ltx:${{ github.sha }}