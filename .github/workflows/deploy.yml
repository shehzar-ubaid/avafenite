name: Deploy to RunPod

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Docker Buildx setup (zaroori hai modern build ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4   # v4 latest recommended hai
        with:
          username: ${{ secrets.DOCKER_USERNAME }}     # ← yeh secret use karo
          password: ${{ secrets.DOCKER_PASSWORD }}     # ← yeh bhi secret (Access Token)

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6   # v6 ya v7 latest best hai
        with:
          context: .
          push: true
          tags: |
            shehzarubaid/avafinite-ltx:latest
            shehzarubaid/avafinite-ltx:${{ github.sha }}
          # cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max